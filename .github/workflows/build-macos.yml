name: Build macOS Executable

on:
  push:
    tags:
      - 'v*' # Trigger build when pushing tags (e.g., v1.0.0)
  workflow_dispatch: # Enable manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          # Locate customtkinter package path dynamically
          CTK_PATH=$(python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))")
          echo "CustomTkinter path: $CTK_PATH"
          
          # Run pyinstaller with colon separator for macOS
          pyinstaller --windowed --onefile \
            --name "Штрафинатор 2000" \
            --icon "app.icns" \
            --add-data "$CTK_PATH:customtkinter/" \
            main.py

      - name: Compress App Bundle
        run: |
          cd dist
          zip -r "../Shtrafinator2000_macOS.zip" "Штрафинатор 2000.app"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: Shtrafinator2000_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
