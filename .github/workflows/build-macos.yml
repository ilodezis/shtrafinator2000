name: Build and Release Application

on:
  push:
    tags:
      - 'v*' # Trigger build when pushing tags (e.g., v1.0.0)
  workflow_dispatch: # Enable manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          # Locate customtkinter package path dynamically
          CTK_PATH=$(python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))")
          echo "CustomTkinter path: $CTK_PATH"

          # Build as .app bundle (no --onefile — required for proper macOS .app structure)
          pyinstaller --windowed \
            --name "Shtrafinator_2000" \
            --icon "app.icns" \
            --add-data "$CTK_PATH:customtkinter/" \
            main.py

      - name: Create DMG Disk Image
        run: |
          mkdir dmg_root
          cp -R "dist/Shtrafinator_2000.app" dmg_root/
          hdiutil create -fs HFS+ -srcfolder dmg_root -volname "Shtrafinator 2000" "Shtrafinator_2000_macOS.dmg"

      - name: Upload macOS DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Штрафинатор 2000 ${{ github.ref_name }}"
          body: |
            Автоматическая сборка приложения Штрафинатор 2000.

            ### Как запустить:
            * **Windows**: Скачайте и запустите `Shtrafinator_2000.exe`.
            * **macOS**: Скачайте и смонтируйте образ `Shtrafinator_2000_macOS.dmg`, затем перетащите приложение в папку «Программы» (Applications).
          files: Shtrafinator_2000_macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Locate customtkinter package path dynamically
          CTK_PATH=$(python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))")
          echo "CustomTkinter path: $CTK_PATH"

          # Latin name avoids Windows path issues with Cyrillic characters
          pyinstaller --noconsole --onefile \
            --name "Shtrafinator_2000" \
            --icon "app.ico" \
            --add-data "app.ico;." \
            --add-data "$CTK_PATH;customtkinter/" \
            main.py

      - name: Upload Windows EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Штрафинатор 2000 ${{ github.ref_name }}"
          body: |
            Автоматическая сборка приложения Штрафинатор 2000.

            ### Как запустить:
            * **Windows**: Скачайте и запустите `Shtrafinator_2000.exe`.
            * **macOS**: Скачайте и смонтируйте образ `Shtrafinator_2000_macOS.dmg`, затем перетащите приложение в папку «Программы» (Applications).
          files: dist/Shtrafinator_2000.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
